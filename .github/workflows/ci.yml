name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Run tests
        run: go test ./... -v -count=1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build all platforms
        run: |
          GOOS=linux GOARCH=amd64 go build -o tldr-linux-amd64 .
          GOOS=darwin GOARCH=amd64 go build -o tldr-darwin-amd64 .
          GOOS=darwin GOARCH=arm64 go build -o tldr-darwin-arm64 .
          GOOS=windows GOARCH=amd64 go build -o tldr-windows-amd64.exe .

      - name: Upload all platform binaries
        uses: actions/upload-artifact@v4
        with:
          name: tldr-binaries
          path: |
            tldr-linux-amd64
            tldr-darwin-amd64
            tldr-darwin-arm64
            tldr-windows-amd64.exe

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, lint, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build for Linux (amd64)
        run: GOOS=linux GOARCH=amd64 go build -o tldr-linux-amd64 .

      - name: Build for macOS (Intel)
        run: GOOS=darwin GOARCH=amd64 go build -o tldr-darwin-amd64 .

      - name: Build for macOS (Apple Silicon)
        run: GOOS=darwin GOARCH=arm64 go build -o tldr-darwin-arm64 .

      - name: Build for Windows (amd64)
        run: GOOS=windows GOARCH=amd64 go build -o tldr-windows-amd64.exe .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tldr-linux-amd64
            tldr-darwin-amd64
            tldr-darwin-arm64
            tldr-windows-amd64.exe
          generate_release_notes: true
