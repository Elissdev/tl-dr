name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Run tests
        run: go test ./... -v -count=1

      - name: Run tests with race detector
        run: go test ./... -race -count=1

      - name: Security scan (gosec)
        run: |
          # v2.20.0 é a última versão compatível com Go 1.22
          go install github.com/securego/gosec/v2/cmd/gosec@v2.20.0
          gosec -exclude-dir=internal/integration ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build
        run: go build -o tldr .

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: tldr-linux-amd64
          path: tldr

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name != 'pull_request'
    needs: [test, lint, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build for release
        run: GOOS=linux GOARCH=amd64 go build -o tldr-linux-amd64 .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: tldr-linux-amd64
          generate_release_notes: true
